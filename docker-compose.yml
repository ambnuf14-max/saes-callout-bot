version: '3.8'

services:
  saes-callout-bot:
    build: .
    container_name: saes-callout-bot
    restart: unless-stopped

    environment:
      - NODE_ENV=production

    # Монтируем .env файл
    env_file:
      - .env

    # Volumes для сохранения данных
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    # Ограничения ресурсов (опционально, настройте под ваш хост)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
